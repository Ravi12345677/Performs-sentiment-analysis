<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Sentiment Analysis App</h1>

    <form method="POST">
        <textarea name="text"
                  placeholder="Enter text here..."
                  required>{{ text }}</textarea>

        <button type="submit">Analyze</button>
    </form>

    {% if sentiment %}
    <div class="result">
        <h2>Result</h2>

        <p><strong>Sentiment:</strong> {{ sentiment }}</p>

        <p><strong>Polarity Score:</strong>
            {{ "%.2f"|format(polarity) }}</p>

        <p><strong>Subjectivity Score:</strong>
            {{ "%.2f"|format(subjectivity) }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
